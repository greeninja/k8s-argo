---
{{- if .Values.pv }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-pvc
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  accessModes:
    - {{ .Values.pv.type }}
  resources:
    requests:
      storage: {{ .Values.size }}
{{- end }}