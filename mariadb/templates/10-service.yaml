apiVersion: v1
kind: Service
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  name: mariadb-service
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Chart.Name }}
    type: database
spec:
  selector:
    app: {{ .Chart.Name }}
    type: database
  ports:
  - port: 3306
    targetPort: mysql
  type: ClusterIP 